version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: multi-memory-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes

  chromadb:
    image: chromadb/chroma:latest
    container_name: multi-memory-chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_HTTP_PORT=8000
    restart: unless-stopped

  app:
    build: .
    container_name: multi-memory-agent
    depends_on:
      - redis
      - chromadb
    ports:
      - "8001:8000"
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - REDIS_URL=redis://redis:6379
      - CHROMA_PERSIST_DIR=/app/chroma_db
    env_file:
      - .env
    restart: unless-stopped

volumes:
  redis_data:
  chroma_data:
